<!DOCTYPE html>
<html>
  <head>
      <link href="./style.css" rel="stylesheet" />
      <script src="script.js" type="text/javascript"></script>
      <script>
        window.onload = () => getAllExpenses(); //Populating the expense table once the browser has loaded in the html to ensure that no race condition between the rendering and population of the expense table occurs
      </script>
  </head>
  <body>
    <header>
      <h1>Welcome to your Expense Tracker</h1>
    </header>
    <body>
      <h2 id="logbook-header">Your Expense Logbook</h2>
      <table id="expenses-table">
        <thead id="expenses-table-header">
          <tr>
            <th scope="col" class="expense-table-header">Title</th>
            <th scope="col" class="expense-table-header">Category</th>
            <th scope="col" class="expense-table-header">Amount</th>
            <th scope="col" class="expense-table-header">Cost</th>
            <th scope="col" class="expense-table-header">Date</th>
            <th scope="col" class="expense-table-header">Description</th>
            <th scope="col" class="expense-table-header">Actions</th>
          </tr>
        </thead>
        <tbody id="expense-table-body">
        </tbody>
      </table>
      <p id="total-cost-paragraph"></p>
    </body>
  </body>
</html>
